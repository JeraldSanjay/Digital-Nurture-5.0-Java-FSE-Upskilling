<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | NEXUS Events</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .registration-wrapper {
            max-width: 800px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }
        
        .registration-card {
            background: white;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            overflow: hidden;
        }
        
        .registration-header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: 2rem;
            text-align: center;
            color: white;
        }
        
        .registration-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .selected-event-banner {
            background: linear-gradient(135deg, #f59e0b20, #f9731620);
            border-left: 4px solid var(--accent-primary);
            padding: 1.25rem;
            margin: 1.5rem;
            border-radius: var(--radius-md);
        }
        
        .registration-form {
            padding: 2rem;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        .error-message {
            color: #ef4444;
            font-size: 0.75rem;
            margin-top: 0.25rem;
            display: block;
        }
        
        @media (max-width: 640px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<header class="modern-header">
    <div class="nav-container">
        <div class="logo-area">
            <span class="logo-icon">🎪</span>
            <span class="logo-text">NEXUS</span>
        </div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="register.html" class="active">Register</a>
            <a href="index.html#gallery">Gallery</a>
            <a href="index.html#feedback">Feedback</a>
            <a href="help.html">Help</a>
        </nav>
    </div>
</header>

<div class="registration-wrapper">
    <div class="registration-card">
        <div class="registration-header">
            <h1><i class="fas fa-ticket-alt"></i> Secure Your Spot</h1>
            <p>Join India's most exciting community events</p>
        </div>
        
        <div id="selectedEventInfo" class="selected-event-banner" style="display: none;">
            <h3 id="selectedEventName" style="color: var(--accent-primary); margin-bottom: 0.5rem;"></h3>
            <p><i class="fas fa-calendar"></i> <span id="selectedEventDate"></span></p>
            <p><i class="fas fa-map-marker-alt"></i> <span id="selectedEventLocation"></span></p>
            <p><i class="fas fa-chair"></i> <span id="selectedEventSeats"></span> seats available</p>
        </div>
        
        <form id="registrationForm" class="registration-form">
            <div class="form-row">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="fullName" placeholder="Enter your full name" required>
                    <span class="error-message" id="nameError"></span>
                </div>
                <div class="form-group">
                    <label>Email Address *</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                    <span class="error-message" id="emailError"></span>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Phone Number *</label>
                    <input type="tel" id="phone" placeholder="+91 98765 43210">
                    <span class="error-message" id="phoneError"></span>
                </div>
                <div class="form-group">
                    <label>Age Group</label>
                    <select id="age">
                        <option>18-25 years</option>
                        <option>26-35 years</option>
                        <option>36-50 years</option>
                        <option>50+ years</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label>Select Event *</label>
                <select id="eventSelect" required>
                    <option value="">-- Choose an event --</option>
                </select>
                <span id="eventFeeDisplay" style="display: inline-block; margin-top: 0.5rem; font-weight: 600; color: #10b981;"></span>
            </div>
            
            <div class="form-group">
                <label>Dietary Requirements</label>
                <select id="dietary">
                    <option>None</option>
                    <option>Vegetarian</option>
                    <option>Vegan</option>
                    <option>Gluten-Free</option>
                    <option>Halal</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Special Requests</label>
                <textarea id="specialRequests" rows="3" placeholder="Any accessibility needs or questions?"></textarea>
                <small id="charCount">0 / 500 characters</small>
            </div>
            
            <div class="form-group">
                <label>
                    <input type="checkbox" id="termsCheckbox" required>
                    I agree to the <a href="#" style="color: var(--accent-primary);">terms & conditions</a> *
                </label>
            </div>
            
            <button type="submit" class="btn-primary">
                <i class="fas fa-check-circle"></i> Complete Registration
            </button>
            
            <output id="formOutput" style="display: block; margin-top: 1.5rem;"></output>
        </form>
    </div>
</div>

<footer class="modern-footer">
    <p>&copy; 2025 NEXUS — Bringing Indian Communities Together 🇮🇳</p>
</footer>

<script src="events-data.js"></script>
<script>
    // Get URL parameter for pre-selected event
    function getUrlParameter(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
    }
    
    const preselectedEventId = getUrlParameter('eventId');
    
    // Populate event dropdown
    function populateEventDropdown() {
        const eventSelect = document.getElementById('eventSelect');
        if (!eventSelect || typeof communityEvents === 'undefined') return;
        
        eventSelect.innerHTML = '<option value="">-- Choose an event --</option>';
        
        communityEvents.forEach(event => {
            if (typeof isUpcomingEvent === 'function' ? isUpcomingEvent(event.date) : true) {
                if (event.availableSeats > 0) {
                    const option = document.createElement('option');
                    option.value = event.id;
                    option.textContent = `${event.name} - ${event.city} (${event.availableSeats} seats)`;
                    eventSelect.appendChild(option);
                }
            }
        });
        
        if (preselectedEventId) {
            eventSelect.value = preselectedEventId;
            updateSelectedEventInfo();
        }
    }
    
    // Update selected event info
    function updateSelectedEventInfo() {
        const eventSelect = document.getElementById('eventSelect');
        const infoDiv = document.getElementById('selectedEventInfo');
        const feeDisplay = document.getElementById('eventFeeDisplay');
        
        if (eventSelect.value && typeof communityEvents !== 'undefined') {
            const event = communityEvents.find(e => e.id === parseInt(eventSelect.value));
            if (event) {
                document.getElementById('selectedEventName').textContent = event.name;
                document.getElementById('selectedEventDate').innerHTML = new Date(event.date).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) + ' at ' + event.time;
                document.getElementById('selectedEventLocation').innerHTML = event.city;
                document.getElementById('selectedEventSeats').innerHTML = event.availableSeats;
                infoDiv.style.display = 'block';
                
                const fees = { Tech: "₹499", Music: "₹1299", Workshop: "₹299", Conference: "₹999" };
                feeDisplay.innerHTML = `💰 Registration Fee: ${fees[event.category] || "₹399"} per person`;
            }
        } else {
            infoDiv.style.display = 'none';
            feeDisplay.innerHTML = '';
        }
    }
    
    // Validation functions
    function validatePhoneNumber() {
        const phone = document.getElementById('phone').value;
        const phoneRegex = /^[\+]?[0-9]{10,12}$/;
        const phoneError = document.getElementById('phoneError');
        if (phone && !phoneRegex.test(phone.replace(/\s/g, ''))) {
            phoneError.textContent = "Enter valid 10-12 digit number";
            return false;
        }
        if (phoneError) phoneError.textContent = "";
        return true;
    }
    
    function updateCharCount() {
        const textarea = document.getElementById('specialRequests');
        const charCount = document.getElementById('charCount');
        if (textarea && charCount) {
            const count = textarea.value.length;
            charCount.textContent = `${count} / 500 characters`;
            if (count > 500) textarea.value = textarea.value.substring(0, 500);
        }
    }
    
    // Form submission
    document.getElementById('registrationForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const name = document.getElementById('fullName').value;
        const email = document.getElementById('email').value;
        const phone = document.getElementById('phone').value;
        const eventId = document.getElementById('eventSelect').value;
        const terms = document.getElementById('termsCheckbox').checked;
        const dietary = document.getElementById('dietary').value;
        
        // Validation
        let isValid = true;
        if (!name || name.length < 2) {
            document.getElementById('nameError').textContent = "Enter valid name (min 2 characters)";
            isValid = false;
        } else {
            document.getElementById('nameError').textContent = "";
        }
        
        if (!email || !email.includes('@')) {
            document.getElementById('emailError').textContent = "Enter valid email";
            isValid = false;
        } else {
            document.getElementById('emailError').textContent = "";
        }
        
        if (!validatePhoneNumber()) isValid = false;
        if (!eventId) { alert("Please select an event"); isValid = false; }
        if (!terms) { alert("Please accept terms & conditions"); isValid = false; }
        
        if (isValid && typeof communityEvents !== 'undefined') {
            const selectedEvent = communityEvents.find(e => e.id === parseInt(eventId));
            
            if (selectedEvent && selectedEvent.availableSeats > 0) {
                selectedEvent.availableSeats--;
                
                // Add registration if function exists
                if (typeof addRegistration === 'function') {
                    addRegistration(name, email, phone, selectedEvent.id, selectedEvent.name, selectedEvent.category);
                }
                if (typeof categoryTracker !== 'undefined' && categoryTracker.increment) {
                    categoryTracker.increment(selectedEvent.category);
                }
                
                document.getElementById('formOutput').innerHTML = `
                    <div style="background: #ecfdf5; padding: 1.5rem; border-radius: 16px; text-align: center;">
                        <i class="fas fa-check-circle" style="font-size: 3rem; color: #10b981;"></i>
                        <h3 style="margin: 1rem 0;">Registration Successful!</h3>
                        <p><strong>${name}</strong>, you're registered for <strong>${selectedEvent.name}</strong></p>
                        <p>Confirmation sent to ${email}</p>
                        <p>Dietary preference: ${dietary}</p>
                        <button onclick="window.location.href='index.html'" class="btn-primary" style="margin-top: 1rem; width: auto; padding: 0.75rem 2rem;">← Back to Events</button>
                        <button onclick="window.location.reload()" class="btn-small" style="margin-top: 1rem; margin-left: 0.5rem;">Register Another</button>
                    </div>
                `;
                this.reset();
                populateEventDropdown();
            } else {
                alert("Sorry, this event is now fully booked!");
            }
        }
    });
    
    // Attach event listeners
    document.getElementById('eventSelect').addEventListener('change', updateSelectedEventInfo);
    document.getElementById('phone').addEventListener('blur', validatePhoneNumber);
    document.getElementById('specialRequests').addEventListener('keyup', updateCharCount);
    
    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
        populateEventDropdown();
        console.log("Registration page loaded - Ready to register!");
    });
    
    // Make functions global
    window.validatePhoneNumber = validatePhoneNumber;
    window.updateCharCount = updateCharCount;
    window.updateSelectedEventInfo = updateSelectedEventInfo;
</script>
</body>
</html>
